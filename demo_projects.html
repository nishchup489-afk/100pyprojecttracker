<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Demo Projects</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: white;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .gradient-text {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 50%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .reveal {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 0.5s ease forwards;
        }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
        .btn-gradient { background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); }
    </style>
</head>
<body>

    <header class="glass-card sticky top-0 z-50 p-6 mb-8">
        <nav class="flex gap-3 flex-wrap">
                    <a href="index.html"
                        class="px-6 py-3 glass-card rounded-xl font-semibold hover:scale-105 transition text-sm">
                        🏠 Home
                    </a>
        </nav>
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-3xl font-black gradient-text">✨ Demo Projects</h1>
            <div class="text-sm text-gray-400">Total Projects: <span id="project-count">0</span></div>
        </div>
    </header>

    <main id="projects-container" class="container mx-auto px-6 pb-20">
        </main>

    <template id="projectCardTemplate">
        <div class="glass-card p-6 rounded-2xl flex flex-col justify-between hover:border-purple-500/50 transition-all">
            <div>
                <div class="flex justify-between items-start mb-4">
                    <span class="text-[10px] font-bold uppercase tracking-widest bg-emerald-500/20 text-emerald-400 px-2 py-1 rounded">Demo</span>
                    <span class="type-badge text-[10px] font-bold uppercase tracking-widest bg-purple-500/20 text-purple-400 px-2 py-1 rounded"></span>
                </div>
                <h3 class="projectTitle text-xl font-bold mb-2"></h3>
                <p class="coreTech text-sm text-gray-400 mb-6 italic"></p>
            </div>
            <div class="flex gap-3">
                <a class="githubLink text-center flex-1 px-4 py-2 rounded-lg glass-card hover:bg-white/10 text-sm font-semibold transition" target="_blank">GitHub</a>
                <a class="liveLink text-center flex-1 px-4 py-2 rounded-lg btn-gradient text-sm font-semibold transition shadow-lg hidden" target="_blank">Live Demo</a>
            </div>
        </div>
    </template>

    <script type="module">
        import demoProjects from './js/demo_projects.js';

        document.addEventListener("DOMContentLoaded", () => {
            const container = document.getElementById("projects-container");
            const template = document.getElementById("projectCardTemplate");
            document.getElementById("project-count").textContent = demoProjects.length;

            const categories = {};

            // Grouping logic with safety checks
            demoProjects.forEach(project => {
                if (!categories[project.category]) {
                    categories[project.category] = { normal: [], mega: [], capstone: [] };
                }
                const type = project.type || 'normal';
                if (categories[project.category][type]) {
                    categories[project.category][type].push(project);
                }
            });

            // Render logic
            Object.keys(categories).forEach((catName, catIndex) => {
                const section = document.createElement('section');
                section.className = "mb-16 reveal";
                section.style.animationDelay = `${catIndex * 0.1}s`;
                
                section.innerHTML = `
                    <div class="flex items-center gap-4 mb-8">
                        <h2 class="text-2xl font-black uppercase tracking-tighter gradient-text">${catName}</h2>
                        <div class="flex-1 h-px bg-white/10"></div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="grid-${catName}"></div>
                `;
                container.appendChild(section);

                const grid = document.getElementById(`grid-${catName}`);
                
                // Combine and render all types for this category
                [...categories[catName].normal, ...categories[catName].mega, ...categories[catName].capstone].forEach(project => {
                    const clone = template.content.cloneNode(true);
                    
                    clone.querySelector(".projectTitle").textContent = project.name;
                    clone.querySelector(".coreTech").textContent = `Core: ${project.core || 'N/A'}`;
                    clone.querySelector(".type-badge").textContent = project.type;
                    
                    const github = clone.querySelector(".githubLink");
                    if (project.github) github.href = project.github;
                    else github.classList.add('opacity-30', 'pointer-events-none');

                    const live = clone.querySelector(".liveLink");
                    if (project.live) {
                        live.href = project.live;
                        live.classList.remove('hidden');
                    }

                    grid.appendChild(clone);
                });
            });
        });
    </script>
</body>
</html>
